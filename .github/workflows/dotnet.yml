name: .NET

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore ERPDesktop.sln

      - name: Build
        run: dotnet build ERPDesktop.sln -c Release --no-restore

      - name: Test
        run: dotnet test ERPDesktop.sln -c Release --no-build --verbosity normal
